<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — kBuddhi AI</title>
  <link rel="stylesheet" href="styles.css" />
  <style>#step2-panel { display: none; }</style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff">
          <path d="M12 2C9.243 2 7 4.243 7 7v3H6a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2v-8a2 2 0 00-2-2h-1V7c0-2.757-2.243-5-5-5zm0 2c1.654 0 3 1.346 3 3v3H9V7c0-1.654 1.346-3 3-3zm0 10a2 2 0 110 4 2 2 0 010-4z"/>
        </svg>
      </div>
      <h1>Reset password</h1>
      <p id="reset-subtitle">Enter your email to receive a reset code</p>
    </div>
    <div id="alert-error"   class="alert alert-error"   role="alert"></div>
    <div id="alert-success" class="alert alert-success" role="alert"></div>

    <div id="step1-panel">
      <form id="step1-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
          <span class="field-error"></span>
        </div>
        <button type="submit" class="btn btn-primary" id="send-btn">Send Reset Code</button>
      </form>
    </div>

    <div id="step2-panel">
      <form id="step2-form" novalidate>
        <div class="form-group">
          <label for="reset-code">Verification code</label>
          <input type="tel" id="reset-code" placeholder="6-digit code from email" inputmode="numeric" maxlength="6" required />
          <span class="field-error"></span>
        </div>
        <div class="form-group">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" placeholder="Create a strong password" autocomplete="new-password" required />
          <span class="field-error"></span>
          <ul class="pwd-rules">
            <li id="rule-length">8+ characters</li>
            <li id="rule-uppercase">Uppercase letter</li>
            <li id="rule-lowercase">Lowercase letter</li>
            <li id="rule-number">Number</li>
            <li id="rule-special">Special character</li>
          </ul>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm new password</label>
          <input type="password" id="confirm-password" placeholder="Repeat your new password" autocomplete="new-password" required />
          <span class="field-error"></span>
        </div>
        <button type="submit" class="btn btn-primary" id="confirm-btn">Set New Password</button>
      </form>
    </div>

    <div class="footer-link"><a href="index.html">&#8592; Back to Sign In</a></div>
  </div>
  <p class="hipaa-notice">&#128274; HIPAA Compliant &nbsp;·&nbsp; Protected under federal privacy regulations</p>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    const emailEl = document.getElementById("email");
    emailEl.addEventListener("input", () => clearError(emailEl));
    document.getElementById("step1-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert("alert-error"); hideAlert("alert-success");
      const email = emailEl.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError(emailEl, "Enter a valid email."); return; }
      const btn = document.getElementById("send-btn");
      btn.disabled = true; btn.textContent = "Sending…";
      try {
        await forgotPassword(email);
        document.getElementById("reset-subtitle").textContent = "Enter the code sent to " + email;
        document.getElementById("step1-panel").style.display = "none";
        document.getElementById("step2-panel").style.display = "block";
        showAlert("alert-success", "Check your email for a 6-digit reset code.");
        document.getElementById("reset-code").focus();
      } catch (err) {
        showAlert("alert-error", cognitoErrorMessage(err));
        btn.disabled = false; btn.textContent = "Send Reset Code";
      }
    });
    const newPwdEl  = document.getElementById("new-password");
    const confPwdEl = document.getElementById("confirm-password");
    newPwdEl.addEventListener("input", () => { updatePwdChecklist(newPwdEl.value); clearError(newPwdEl); });
    confPwdEl.addEventListener("input", () => {
      if (confPwdEl.value && confPwdEl.value !== newPwdEl.value) showError(confPwdEl, "Passwords do not match.");
      else clearError(confPwdEl);
    });
    document.getElementById("step2-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert("alert-error"); hideAlert("alert-success");
      const email   = document.getElementById("email").value.trim();
      const code    = document.getElementById("reset-code").value.trim();
      const newPwd  = newPwdEl.value;
      const confPwd = confPwdEl.value;
      let valid = true;
      if (!code || code.length < 6) { showError(document.getElementById("reset-code"), "Enter the 6-digit code."); valid = false; }
      if (!isPasswordValid(newPwd))  { showError(newPwdEl, "Password does not meet requirements."); valid = false; }
      if (newPwd !== confPwd)        { showError(confPwdEl, "Passwords do not match."); valid = false; }
      if (!valid) return;
      const btn = document.getElementById("confirm-btn");
      btn.disabled = true; btn.textContent = "Saving…";
      try {
        await confirmForgotPassword(email, code, newPwd);
        showAlert("alert-success", "Password updated! Redirecting to sign in…");
        setTimeout(() => { window.location.href = "index.html"; }, 1800);
      } catch (err) {
        showAlert("alert-error", cognitoErrorMessage(err));
        btn.disabled = false; btn.textContent = "Set New Password";
      }
    });
  </script>
</body>
</html>
