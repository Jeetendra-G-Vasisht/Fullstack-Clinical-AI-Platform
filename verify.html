<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two-Factor Verification — kBuddhi AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1>Two-factor check</h1>
      <p>We sent a 6-digit code to your email</p>
    </div>
    <div id="alert-error" class="alert alert-error" role="alert"></div>
    <div class="otp-group">
      <input type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 1" />
      <input type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 2" />
      <input type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 3" />
      <input type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 4" />
      <input type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 5" />
      <input type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 6" />
    </div>
    <p class="otp-note">Code expires in <strong>5 minutes</strong></p>
    <button class="btn btn-primary" id="verify-btn" disabled>Verify &amp; Sign In</button>
    <div class="footer-link" style="margin-top:16px;"><a href="index.html">&#8592; Back to Sign In</a></div>
  </div>
  <p class="hipaa-notice">&#128274; HIPAA Compliant &nbsp;·&nbsp; 2FA required for secure access</p>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    if (!sessionStorage.getItem("otp_pending_email")) { window.location.href = "index.html"; }
    initOtpInputs();
    document.getElementById("verify-btn").addEventListener("click", async () => {
      hideAlert("alert-error");
      const code = getOtpValue();
      const btn = document.getElementById("verify-btn");
      btn.disabled = true; btn.textContent = "Verifying…";
      const result = await verifyOtpCode(code);
      if (result.valid) {
        window.location.href = "upload.html";
      } else {
        showAlert("alert-error", result.message);
        if (result.expired) { setTimeout(() => { window.location.href = "index.html"; }, 2000); }
        else { btn.disabled = false; btn.textContent = "Verify & Sign In"; }
      }
    });
  </script>
</body>
</html>
